<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 春節旅行管理員 - 終極整合版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 240px; --primary-color: #c0392b; --bg-dark: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg-dark); color: white; }
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #2d2d2d; padding: 2.5rem; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; }
        input { padding: 0.8rem; width: 80%; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; margin-bottom: 1.5rem; text-align: center; font-size: 1rem; }
        button.login-btn { padding: 0.8rem 2rem; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        #dashboard { display: none; min-height: 100vh; grid-template-columns: var(--sidebar-width) 1fr; background: #f4f7f6; color: #333; }
        #sidebar { background: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 0 25px 20px; font-size: 1.2rem; font-weight: bold; color: #e74c3c; border-bottom: 1px solid #34495e; margin-bottom: 10px; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1rem; }
        .nav-item:hover { background: #34495e; }
        .nav-item.active { background: var(--primary-color); color: white; }
        #main-content { padding: 30px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #c0392b; }
        .card h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .card p { line-height: 1.8; margin: 10px 0; }
        .card ul { padding-left: 20px; line-height: 1.8; }
        .card li { margin-bottom: 8px; }
        .card strong { color: #c0392b; }
        .emoji-tag { background: #fff3f3; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; border: 1px solid #ffecec; }
        a { color: #c0392b; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        @media (max-width: 768px) { 
            #dashboard { grid-template-columns: 1fr; }
            #sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>🧧 2026 春節旅程管理員</h2>
            <input type="password" id="passkey" placeholder="請輸入解密密碼">
            <button class="login-btn" onclick="checkPass()">進入儀表板</button>
            <p id="error" style="color: #ff5555; display:none; margin-top:15px;">密碼錯誤</p>
        </div>
    </div>

    <div id="dashboard">
        <div id="sidebar">
            <div class="sidebar-brand">春節攻略大師</div>
            <div id="nav-itinerary" class="nav-item active" onclick="showTab('itinerary')"><i class="fa fa-calendar-day"></i> 完整行程</div>
            <div id="nav-reminders" class="nav-item" onclick="showTab('reminders')"><i class="fa fa-bell"></i> 關鍵提醒</div>
            <div id="nav-maps" class="nav-item" onclick="showTab('maps')"><i class="fa fa-map-location-dot"></i> 導航與美食</div>
            <div id="nav-checklist" class="nav-item" onclick="showTab('checklist')"><i class="fa fa-list-check"></i> 裝備檢核</div>
        </div>
        <div id="main-content"></div>
    </div>

    <script>
        const data = {
            itinerary: `
                <h2 style="color: #c0392b;">🧧 2026 春節：環島補完計畫 (全細節整合版)</h2>
                
                <div class="card" style="border-left-color: #27ae60;">
                    <h3>📅 2/13 (五) 嘉義：老饕開場，雞肉飯與檜木香</h3>
                    <p><strong>09:30 - 11:30</strong> 高雄出發 -> 抵達嘉義市區。</p>
                    <p><span class="emoji-tag">🍽️ 必吃正餐</span> 12:00 午餐：<a href="https://www.google.com/maps/search/嘉義+阿宏師+和平+火雞肉飯" target="_blank">阿宏師火雞肉飯 或 和平嘉義火雞肉飯</a> (在地人最愛，肉嫩油香)。</p>
                    <p><span class="emoji-tag">🕒 景點</span> 13:30 - 16:30 檜意森活村 & 嘉義製材所。</p>
                    <p><span class="emoji-tag">📸 紀念品</span> 檜意森活村「木製文創商品」(檜木筷子、杯墊)。</p>
                    <p><span class="emoji-tag">🎁 伴手禮</span> 17:00 ~ 17:30 採買：福義軒蛋捲 (或溢香蛋捲)、<a href="https://www.google.com/maps/search/源興御香屋" target="_blank">源興御香屋</a> (預約葡萄柚綠茶)。</p>
                    <p><span class="emoji-tag">🍽️ 必吃正餐</span> 17:30 晚餐：涮乃葉 (已預約) ＆ 19:00 消夜：<a href="https://www.google.com/maps/search/林聰明沙鍋魚頭" target="_blank">林聰明沙鍋魚頭</a> (傳奇名店)。<br>
                    <em>*備註：若不想排隊，可買冷凍包回高雄，當天改吃松山土窯羊肉(需預約)。</em></p>
                </div>

                <div class="card" style="border-left-color: #2980b9;">
                    <h3>📅 2/14 (六) 日月潭：湖畔野餐與情人節大餐</h3>
                    <p><strong>08:00 - 10:00</strong> 嘉義出發 -> 抵達日月潭向山遊客中心。</p>
                    <p><span class="emoji-tag">🍽️ 輕食採買</span> 10:30 水社商圈：MOS 米漢堡 + 茶葉蛋 + 山豬肉刈包。</p>
                    <p><span class="emoji-tag">🕒 鐵馬行</span> 11:00 - 15:00 路線：水社 -> <a href="https://www.google.com/maps/place/向山遊客中心" target="_blank">向山</a> (野餐) -> 九龍口。</p>
                    <p><span class="emoji-tag">🎁 伴手禮</span> 向山遊客中心：<a href="https://www.google.com/maps/search/向山遊客中心+惠蓀咖啡" target="_blank">惠蓀咖啡</a>、<a href="https://www.google.com/maps/search/向山遊客中心+日月潭紅茶" target="_blank">日月潭紅茶</a> (台茶18號/紅玉) 禮盒。</p>
                    <p><span class="emoji-tag">🍽️ 必吃正餐</span> 18:30 晚餐：<a href="https://www.google.com/maps/place/潮港城太陽百匯" target="_blank">台中潮港城太陽百匯</a> (海鮮吃到飽，情人節大餐)。</p>
                    <p><span class="emoji-tag">✨ 驚喜</span> 餐後 5 分鐘車程：<a href="https://www.google.com/maps/place/望高寮夜景公園" target="_blank">望高寮百萬夜景</a>！</p>
                </div>

                <div class="card" style="border-left-color: #f1c40f;">
                    <h3>📅 2/15 (日) 六福村 -> 板橋：遊樂園與慶生夜</h3>
                    <p><strong>06:00 - 09:00</strong> 起床梳洗吃早餐 -> 07:00 出門開車 -> 全家買早餐 (停留吃) -> 08:30 抵達六福村。<br><strong>09:00 - 17:00</strong> <a href="https://www.google.com/maps/search/六福村主題遊樂園" target="_blank">六福村主題遊樂園</a> (玩好玩滿)。<br><span class="emoji-tag">🎢 設施順序</span> 笑傲飛鷹 -> 風火輪 -> 大怒神 -> <strong>10:30</strong> 動物園區 -> 急流泛舟 -> 蘇丹王大冒險 / 魔宮歷險 (室內) -> 旋轉木馬 / 咖啡杯 (放鬆用)。</p>
                    <p><span class="emoji-tag">📸 紀念品</span> 髮箍或白老虎玩偶。APP 必備：Lineup 預約設施。</p>
                    <p><strong>🕒 18:30</strong> 抵達板橋 Check-in。</p>
                    <p><span class="emoji-tag">🍽️ 慶生晚餐</span> 19:00 二選一 (需預約)：<br>
                        A. <a href="https://www.google.com/maps/search/肉多多火鍋+板橋實踐店" target="_blank">肉多多火鍋</a> (壽星肉蛋糕)。<br>
                        B. <a href="https://www.google.com/maps/search/雅香石頭火鍋+板橋店" target="_blank">雅香石頭火鍋</a> (老店爆炒)。</p>
                    <p><span class="emoji-tag">🎁 伴手禮</span> 21:00 宵夜/採買：<a href="https://www.google.com/maps/search/小潘蛋糕坊" target="_blank">小潘鳳凰酥</a>。⚠️ 板橋最強，必買！</p>
                </div>

                <div class="card" style="border-left-color: #e74c3c;">
                    <h3>📅 2/16 (一) 除夕：台北雙鐵與圍爐時刻</h3>
                    <p><span class="emoji-tag">🚲 單車</span> 09:00 路線：馬場町 -> 台大 -> 大安森林公園。</p>
                    <p><span class="emoji-tag">🍽️ 午餐</span> 12:00 <a href="https://www.google.com/maps/search/永康街" target="_blank">永康街</a> <a href="https://www.google.com/maps/search/<a href="https://www.google.com/maps/search/金雞園" target="_blank">金雞園</a>+<a href="https://www.google.com/maps/search/永康街" target="_blank">永康街</a>" target="_blank"><a href="https://www.google.com/maps/search/金雞園" target="_blank">金雞園</a></a>：必點酥炸排骨、蟹黃湯包、酥餅。</p>
                    <p><strong>🕒 下午</strong> <a href="https://www.google.com/maps/search/台北+101+觀景台" target="_blank">台北 101 觀景台</a> (需確認除夕時間) -> <a href="https://www.google.com/maps/search/中正紀念堂" target="_blank">中正紀念堂</a>。</p>
                    <p><span class="emoji-tag">📸 紀念品</span> 101 造型水、觀景台紀念幣。</p>
                    <p><span class="emoji-tag">🏮 圍爐</span> 18:00 除夕晚餐：<strong style="color: #c0392b;">Mega 50 或 王品牛排</strong> (需提前3個月訂)。<br>
                    <em>*備案：海釣族真味園外帶年菜回飯店吃。</em></p>
                </div>

                <div class="card" style="border-left-color: #8e44ad;">
                    <h3>📅 2/17 (二) 初一：北海岸財神與海味</h3>
                    <p><strong>06:30</strong> 板橋提早出發 (避開初一財神廟戰場)。</p>
                    <p><span class="emoji-tag">⛩️ 開運</span> 07:30 <a href="https://www.google.com/maps/place/金山財神廟" target="_blank">金山財神廟</a> (求發財金)。</p>
                    <p><strong>09:30</strong> <a href="https://www.google.com/maps/search/野柳地質公園" target="_blank">野柳地質公園</a> (看女王頭)。📸 紀念品：海洋 Q 版磁鐵。</p>
                    <p><span class="emoji-tag">🍽️ 午餐</span> 11:00 龜吼漁港 <a href="https://www.google.com/maps/search/巧晏漁坊" target="_blank">巧晏漁坊</a>：必點萬里蟹、避風塘中卷。</p>
                    <p><span class="emoji-tag">🎁 伴手禮</span> 金山芋圓王、阿玉蔴粩。</p>
                    <p><span class="emoji-tag">🕒 傍晚</span> 淡水漁人碼頭夕陽騎行。</p>
                    <p><span class="emoji-tag">🍽️ 晚餐</span> 18:00 二選一 (步行可達)：<br>
                        A. 領事館咖啡 (河岸夜景/牛奶鍋)。<br>
                        B. Kooks 異嗑堂 (美式大餐氣氛)。</p>
                </div>

                <div class="card" style="border-left-color: #795548;">
                    <h3>📅 2/18 (三) 初二：淡水巡禮與回程</h3>
                    <p><strong>09:30</strong> 老街採買：許義魚酥、<a href="https://www.google.com/maps/search/淡水+新建成餅店" target="_blank">新建成餅店</a>(芝麻蛋黃)、緣味蛋糕。</p>
                    <p><span class="emoji-tag">🍽️ 午餐</span> 11:00 <a href="https://www.google.com/maps/search/黑殿飯店" target="_blank">黑殿飯店</a>：必點「帶骨排骨飯」。</p>
                    <p><strong>13:00</strong> 啟程返回高雄。⚠️ 預警：準備好音樂，面對南下回娘家車潮。</p>
                </div>
            `,
            reminders: `
                <div class="card">
                    <h3>📅 1. 關鍵預約決生生 (Deadline Alert)</h3>
                    <ul>
                        <li><strong>2/14 晚餐：</strong> 台中潮港城 (情人節，極難訂)。</li>
                        <li><strong>2/15 晚餐：</strong> 肉多多 或 雅香 (板橋)。</li>
                        <li><strong>2/16 除夕晚餐：</strong> Mega 50、王品 (提前 2-3 個月確認)。</li>
                        <li><strong>2/17 初一晚餐：</strong> 領事館咖啡 或 Kooks 異嗑堂 (淡水)。</li>
                        <li><strong>住宿備註：</strong> 致電會館「攜摺疊車入房」，並確認停車位。</li>
                    </ul>
                </div>
                <div class="card">
                    <h3>🚗 2. 愛車與交通對策</h3>
                    <ul>
                        <li><strong>行前檢查：</strong> 出發前一週進廠保養五油三水、胎壓。</li>
                        <li><strong>高乘載注意：</strong> 若人數不足，管制時段請改走 <strong>台 61 線西濱</strong>。</li>
                        <li><strong>塞車神器：</strong> 尿袋、大瓶水、涼糖、暈車藥。</li>
                    </ul>
                </div>
                <div class="card">
                    <h3>🧧 3. 春節生存法則</h3>
                    <ul>
                        <li><strong>現金為王：</strong> 身上備足 $3,000~$5,000 現金 (廟宇/漁港/路邊攤用)。</li>
                        <li><strong>心理建設：</strong> 「排隊是常態，塞車是風景」。保持愉快心情。</li>
                    </ul>
                </div>
            `,
            maps: `
                <div class="card">
                    <h3>📍 2026 全台精選導航清單</h3>
                    <ul style="line-height: 2;">
                        <li><a href="https://www.google.com/maps/dir/高雄/嘉義阿宏師/向山遊客中心/六福村/板橋/台北101/野柳/淡水黑殿/高雄" target="_blank">🚗 全程優化導航路徑 (環島規劃)</a></li>
                        <li><a href="https://www.google.com/maps/search/阿宏師+和平+火雞肉飯+林聰明沙鍋魚頭+潮港城+Mega50+巧晏漁坊+黑殿飯店" target="_blank">🍴 老饕朝聖名店全地圖</a></li>
                        <li><a href="https://www.google.com/maps/search/福義軒+小潘鳳凰酥+許義魚酥+新建成+阿玉蔴粩+源興御香屋" target="_blank">🎁 伴手禮掃貨攻略圖</a></li>
                        <li><a href="https://www.google.com/maps/place/望高寮夜景公園" target="_blank">🌃 台中百萬夜景：望高寮</a></li>
                    </ul>
                </div>
            `,
            checklist: `
                <div class="card">
                    <h3>🚲 單車特攻隊裝備</h3>
                    <ul>
                        <li>✅ 攜車袋 (進飯店、搭捷運必備)</li>
                        <li>✅ 簡易維修組 (內胎、打氣筒、挖胎棒)</li>
                        <li>✅ 前後車燈 & 車鎖</li>
                    </ul>
                </div>
                <div class="card">
                    <h3>🎒 行李與衣物</h3>
                    <ul>
                        <li>✅ 洋蔥式穿搭 (內層排汗、中層輕羽絨、外層防風)</li>
                        <li>✅ 雨備 (摺疊傘、輕便雨衣)</li>
                        <li>✅ 行動電源 (至少 2 顆) 與車充</li>
                    </ul>
                </div>
            `
        };

        function checkPass() {
            const pass = document.getElementById('passkey').value;
            if (pass === '2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                showTab('itinerary');
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tabId).classList.add('active');
            document.getElementById('main-content').innerHTML = data[tabId];
            window.scrollTo(0,0);
        }

        document.getElementById("passkey").addEventListener("keypress", (e) => { if(e.key === "Enter") checkPass(); });
    </script>
</body>
</html>
