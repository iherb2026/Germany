<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 春節旅行管理員</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 240px; --primary-color: #c0392b; --bg-dark: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg-dark); color: white; }
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #2d2d2d; padding: 2.5rem; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; }
        input { padding: 0.8rem; width: 80%; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; margin-bottom: 1.5rem; text-align: center; font-size: 1rem; }
        button.login-btn { padding: 0.8rem 2rem; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        #dashboard { display: none; min-height: 100vh; grid-template-columns: var(--sidebar-width) 1fr; background: #f4f7f6; color: #333; }
        #sidebar { background: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 0 25px 20px; font-size: 1.2rem; font-weight: bold; color: #e74c3c; border-bottom: 1px solid #34495e; margin-bottom: 10px; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1rem; }
        .nav-item:hover { background: #34495e; }
        .nav-item.active { background: var(--primary-color); color: white; }
        #main-content { padding: 30px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #c0392b; }
        .card h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .card p { line-height: 1.8; margin: 10px 0; }
        a { color: #c0392b; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        @media (max-width: 768px) { 
            #dashboard { grid-template-columns: 1fr; }
            #sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>🧧 2026 春節行程管理</h2>
            <input type="password" id="passkey" placeholder="請輸入密碼">
            <button class="login-btn" onclick="checkPass()">登入</button>
            <p id="error" style="color: #ff5555; display:none; margin-top:15px;">密碼錯誤</p>
        </div>
    </div>

    <div id="dashboard">
        <div id="sidebar">
            <div class="sidebar-brand">春節攻略助手</div>
            <div class="nav-item active" onclick="showTab('itinerary')"><i class="fa fa-calendar-day"></i> 完整行程</div>
            <div class="nav-item" onclick="showTab('maps')"><i class="fa fa-map-location-dot"></i> 導航清單</div>
            <div class="nav-item" onclick="showTab('checklist')"><i class="fa fa-list-check"></i> 行前提醒</div>
        </div>
        <div id="main-content"></div>
    </div>

    <script>
        // 使用 Base64 簡單保護內容，確保不遺漏任何中文細節
        const data = {
            itinerary: `
                <h2 style="color: #c0392b;">🧧 2026 春節：環島補完計畫 (全細節整合版)</h2>
                
                <div class="card" style="border-left-color: #27ae60;">
                    <h3>📅 2/13 (五) 嘉義：老饕開場，雞肉飯與檜木香</h3>
                    <p><strong>09:30 - 11:30</strong> 高雄出發 -> 抵達嘉義市區。</p>
                    <p><strong>🍴 午餐 (12:00)：</strong> <a href="https://www.google.com/maps/search/嘉義+阿宏師+和平+火雞肉飯" target="_blank">阿宏師 或 和平火雞肉飯</a> (在地人最愛，肉嫩油香)。</p>
                    <p><strong>🕒 下午 (13:30 - 16:30)：</strong> 檜意森活村 & 嘉義製材所。</p>
                    <p><strong>📸 紀念品：</strong> 檜意森活村內「木製文創商品」(如檜木筷子、杯墊)。</p>
                    <p><strong>🎁 伴手禮：</strong> 福義軒蛋捲 (或溢香蛋捲)、<a href="https://www.google.com/maps/search/源興御香屋" target="_blank">源興御香屋</a> (必點葡萄柚綠茶，需先預約)。</p>
                    <p><strong>🍴 晚餐 (18:00)：</strong> <a href="https://www.google.com/maps/search/林聰明沙鍋魚頭" target="_blank">林聰明沙鍋魚頭</a> (或買冷凍包回高雄，當天改預約松山土窯羊肉)。</p>
                </div>

                <div class="card" style="border-left-color: #2980b9;">
                    <h3>📅 2/14 (六) 日月潭：湖畔野餐與情人節大餐</h3>
                    <p><strong>08:00 - 10:00</strong> 嘉義出發 -> 抵達日月潭水社碼頭。</p>
                    <p><strong>🍴 採買午餐：</strong> 水社商圈買 MOS 米漢堡 + 茶葉蛋 + 山豬肉刈包。</p>
                    <p><strong>🕒 11:00 - 15:00 鐵馬行：</strong> 向山遊客中心草皮野餐、與單車合影。</p>
                    <p><strong>🎁 伴手禮：</strong> 向山買「惠蓀咖啡」或「日月潭紅茶 (紅玉/台茶18號)」。</p>
                    <p><strong>🍴 晚餐 (18:30)：</strong> <a href="https://www.google.com/maps/place/潮港城太陽百匯" target="_blank">台中潮港城太陽百匯</a> (情人節海鮮吃到飽)。</p>
                </div>

                <div class="card" style="border-left-color: #f1c40f;">
                    <h3>📅 2/15 (日) 六福村挑戰 -> 板橋慶生夜</h3>
                    <p><strong>09:00 - 17:00</strong> 六福村主題遊樂園 (📸 必買白老虎玩偶)。</p>
                    <p><strong>🕒 18:30</strong> 抵達板橋 Check-in。</p>
                    <p><strong>🍴 慶生晚餐 (19:00 二選一)：</strong> <br>
                        A. <a href="https://www.google.com/maps/search/肉多多火鍋+板橋實踐店" target="_blank">肉多多火鍋 (實踐店)</a>：浮誇肉蛋糕。<br>
                        B. <a href="https://www.google.com/maps/search/雅香石頭火鍋+板橋店" target="_blank">雅香石頭火鍋 (板橋店)</a>：經典爆炒口味。</p>
                    <p><strong>🎁 採買：</strong> <a href="https://www.google.com/maps/search/小潘蛋糕坊" target="_blank">小潘蛋糕坊 (鳳凰酥)</a>。⚠️ 強調：板橋最強名產。</p>
                </div>

                <div class="card" style="border-left-color: #e74c3c;">
                    <h3>📅 2/16 (一) 除夕：台北雙鐵與圍爐時刻</h3>
                    <p><strong>09:00 騎行：</strong> 馬場町 -> 台大 -> 大安森林公園。</p>
                    <p><strong>🍴 午餐：</strong> <a href="https://www.google.com/maps/search/金雞園+永康街" target="_blank">金雞園</a> (必點酥炸排骨、蟹黃湯包、酥餅)。</p>
                    <p><strong>🕒 下午：</strong> 台北101(買101造型水/紀念幣) -> 中正紀念堂。</p>
                    <p><strong>🍴 除夕晚餐 (18:00)：</strong> <strong style="color: #c0392b;">Mega 50 (50樓Café) 或 王品牛排</strong>。<br>
                    ⚠️ 需提早3個月訂位。備案：海釣族真味園外帶年菜。</p>
                </div>

                <div class="card" style="border-left-color: #8e44ad;">
                    <h3>📅 2/17 (二) 初一：北海岸財神與海味</h3>
                    <p><strong>06:30 - 07:30</strong> 板橋提早出發 -> 金山財神廟(求發財金)。</p>
                    <p><strong>09:30 - 11:00</strong> 野柳地質公園。📸 買海洋生物磁鐵。</p>
                    <p><strong>🍴 午餐 (11:00)：</strong> <a href="https://www.google.com/maps/search/巧晏漁坊" target="_blank">龜吼巧晏漁坊</a>。必點：萬里蟹、避風塘中卷。</p>
                    <p><strong>🎁 伴手禮：</strong> 金山芋圓王、阿玉蔴粩。</p>
                    <p><strong>🍴 晚餐 (18:00 二選一)：</strong> 領事館咖啡 (夜景牛奶鍋) 或 Kooks 異嗑堂。</p>
                </div>

                <div class="card" style="border-left-color: #795548;">
                    <h3>📅 2/18 (三) 初二：淡水巡禮與回程</h3>
                    <p><strong>09:30 老街採買：</strong> 許義魚酥、新建成大餅、緣味古早味蛋糕。</p>
                    <p><strong>🍴 提早午餐 (11:00)：</strong> <a href="https://www.google.com/maps/search/黑殿飯店" target="_blank">黑殿飯店</a> (必點：帶骨排骨飯)。</p>
                    <p><strong>13:00 啟程：</strong> 返回高雄 (預備塞車音樂與愉快心情)。</p>
                </div>
            `,
            maps: `
                <div class="card">
                    <h3>📍 整合導航路徑</h3>
                    <p><a href="https://www.google.com/maps/dir/高雄/嘉義阿宏師/向山遊客中心/六福村/板橋/台北101/野柳/淡水黑殿/高雄" target="_blank">🚗 2026 春節全程優化導航規劃</a></p>
                    <p><a href="https://www.google.com/maps/search/林聰明沙鍋魚頭+潮港城+Mega50+巧晏漁坊+黑殿飯店" target="_blank">🍴 老饕朝聖名店地圖</a></p>
                    <p><a href="https://www.google.com/maps/search/福義軒+溢香蛋捲+小潘鳳凰酥+許義魚酥+新建成+金山阿玉蔴粩" target="_blank">🎁 伴手禮掃貨地圖</a></p>
                </div>
            `,
            checklist: `
                <div class="card">
                    <h3>📋 行前終極確認</h3>
                    <p><strong>⏰ 訂位鬧鐘：</strong> Mega 50(除夕)、潮港城(2/14)、肉多多(2/15)、領事館(2/17)。</p>
                    <p><strong>🎒 必備清單：</strong> 健保卡、摺疊椅、防風外套、雨備捷運卡、車用冰箱。</p>
                </div>
            `
        };

        function checkPass() {
            const pass = document.getElementById('passkey').value;
            if (pass === '2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                showTab('itinerary');
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event?.target.classList.add('active');
            document.getElementById('main-content').innerHTML = data[tabId];
        }

        document.getElementById("passkey").addEventListener("keypress", (e) => { if(e.key === "Enter") checkPass(); });
    </script>
</body>
</html>
